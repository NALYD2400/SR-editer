<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - SR Editer</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/portal.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
  <div class="portal-container">
    <div class="portal-card">
      <div class="portal-header">
        <img src="assets/images/logo_detoured.png" alt="SR Editer" class="portal-logo" onerror="this.style.display='none'">
        <h1>SR Editer</h1>
        <p>Connecte-toi pour gérer ton abonnement.</p>
      </div>

      <form id="login-form">
        <div class="portal-field">
          <label>Email</label>
          <input type="email" id="email" required placeholder="ton@email.com">
        </div>
        <div class="portal-field">
          <label>Mot de passe</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <p id="error-message" class="portal-error" style="display: none;"></p>
        <button type="submit" class="portal-btn primary" id="submit-btn">Se connecter</button>
      </form>

      <div class="portal-divider">
        <span>OU</span>
      </div>

      <button id="discord-btn" class="portal-btn discord">
        <svg viewBox="0 0 127.14 96.36" width="16" height="16" fill="currentColor">
          <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.08 0A72.37 72.37 0 0 0 45.67 0a105.14 105.14 0 0 0-26.23 8.07C2.93 32.33-3.1 56 1.34 79.23a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.1 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 62.72 0c.86.66 1.75 1.34 2.66 2a68.3 68.3 0 0 1-10.85 5.18 77.7 77.7 0 0 0 6.89 11.1 105.73 105.73 0 0 0 32.17-16.15c5.01-26.65-2.22-49.88-18.1-71.16ZM42.45 65.69c-6.11 0-11.14-5.63-11.14-12.56S36.21 40.57 42.45 40.57c6.2 0 11.23 5.71 11.14 12.56 0 6.93-4.94 12.56-11.14 12.56Zm42.24 0c-6.11 0-11.14-5.63-11.14-12.56S78.49 40.57 84.69 40.57c6.2 0 11.23 5.71 11.14 12.56 0 6.93-4.94 12.56-11.14 12.56Z" />
        </svg>
        Continuer avec Discord
      </button>

      <p class="portal-footer">
        <a href="index.html">← Retour au site</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/portal-login.js"></script>
</body>
</html>
