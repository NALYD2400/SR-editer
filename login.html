<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - SR Editer</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/ambient.css?v=1">
  <link rel="stylesheet" href="styles/portal.css?v=6">
  <link rel="stylesheet" href="styles/auth.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body auth-body auth-body--locked">
  <div class="ambient-background" aria-hidden="true">
    <div class="ambient-wallpaper-stack" id="ambient-wallpaper-stack"></div>
  </div>
  <div class="ambient-vignette" aria-hidden="true"></div>

  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/logo.png" class="auth-logo" alt="SR Editer" onerror="this.style.display='none'">
        <p class="auth-subtitle" id="auth-subtitle">Connecte-toi pour accéder au studio.</p>
      </div>

      <form class="auth-form" id="auth-form">
        <label class="auth-field">
          <span>Email</span>
          <input type="email" id="email" autocomplete="email" required placeholder="ton@email.com">
        </label>

        <label class="auth-field">
          <span>Mot de passe</span>
          <div class="password-input-wrapper">
            <input type="password" id="password" autocomplete="current-password" required minlength="8" placeholder="••••••••">
            <button type="button" class="password-toggle-btn" data-toggle-password="password" aria-label="Afficher le mot de passe">
              <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </label>

        <label class="auth-field" id="confirm-password-field" hidden>
          <span>Confirmer le mot de passe</span>
          <div class="password-input-wrapper">
            <input type="password" id="confirm-password" autocomplete="new-password" minlength="8" placeholder="••••••••">
          </div>
        </label>

        <p id="error-message" class="auth-error"></p>
        <p id="success-message" class="auth-success"></p>

        <button type="submit" class="auth-submit" id="submit-btn">Se connecter</button>
      </form>

      <div class="auth-divider">
        <span>OU</span>
      </div>

      <button type="button" class="auth-discord-btn" id="discord-btn">
        <svg viewBox="0 0 127.14 96.36" width="16" height="16" fill="currentColor">
          <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.08 0A72.37 72.37 0 0 0 45.67 0a105.14 105.14 0 0 0-26.23 8.07C2.93 32.33-3.1 56 1.34 79.23a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.1 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 62.72 0c.86.66 1.75 1.34 2.66 2a68.3 68.3 0 0 1-10.85 5.18 77.7 77.7 0 0 0 6.89 11.1 105.73 105.73 0 0 0 32.17-16.15c5.01-26.65-2.22-49.88-18.1-71.16ZM42.45 65.69c-6.11 0-11.14-5.63-11.14-12.56S36.21 40.57 42.45 40.57c6.2 0 11.23 5.71 11.14 12.56 0 6.93-4.94 12.56-11.14 12.56Zm42.24 0c-6.11 0-11.14-5.63-11.14-12.56S78.49 40.57 84.69 40.57c6.2 0 11.23 5.71 11.14 12.56 0 6.93-4.94 12.56-11.14 12.56Z" />
        </svg>
        Continuer avec Discord
      </button>

      <p class="auth-switch-mode" id="auth-switch">
        Pas encore de compte ?
        <button type="button" id="switch-to-signup">S'inscrire</button>
      </p>

      <a class="auth-back-link" href="index.html">← Retour au site</a>
    </div>
  </div>

  <script src="js/wallpapers.js"></script>
  <script src="js/config.js"></script>
  <script src="js/sr-supabase.js?v=1"></script>
  <script src="js/ambient.js?v=6"></script>
  <script src="js/portal-login.js?v=3"></script>
  <script>
    (function initPasswordToggles() {
      document.querySelectorAll("[data-toggle-password]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const input = document.getElementById(btn.getAttribute("data-toggle-password"));
          if (!input) return;
          const eyeOpen = btn.querySelector(".eye-open");
          const eyeClosed = btn.querySelector(".eye-closed");
          if (input.type === "password") {
            input.type = "text";
            if (eyeOpen) eyeOpen.style.display = "block";
            if (eyeClosed) eyeClosed.style.display = "none";
            btn.setAttribute("aria-label", "Masquer le mot de passe");
          } else {
            input.type = "password";
            if (eyeOpen) eyeOpen.style.display = "none";
            if (eyeClosed) eyeClosed.style.display = "block";
            btn.setAttribute("aria-label", "Afficher le mot de passe");
          }
        });
      });
    })();
  </script>
</body>
</html>
